<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Baratisay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="images/favicon/android-chrome-192x192.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .contact-main {
      max-width: 700px;
      margin: 2rem auto;
      padding: 2.5rem 1.5rem;
      background: #fff7f0;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .contact-main h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #111;
    }

    .contact-main > p {
      text-align: center;
      color: #666;
      margin-bottom: 1.5rem;
    }

    /* INFO CARDS */
    .contact-info {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .contact-info-item {
      flex: 1;
      min-width: 140px;
      max-width: 220px;
      background: #fff;
      border: 1.5px solid #ffe3d0;
      border-radius: 1rem;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .contact-icon {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    .contact-info-item strong {
      font-size: 0.75rem;
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
      display: block;
    }

    .contact-info-item p {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      color: #2c2c2c;
      text-align: center;
    }

    .contact-info-item a {
      color: #bb2f2f;
      text-decoration: none;
    }

    /* WHATSAPP BUTTON */
    .whatsapp-btn {
      display: block;
      text-align: center;
      background-color: #25D366;
      color: #fff;
      padding: 0.9rem 1.5rem;
      border-radius: 2rem;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      margin: 0 auto 1.5rem auto;
      max-width: 320px;
      transition: background-color 0.3s ease;
    }

    .whatsapp-btn:hover { background-color: #1ebe5b; }

    /* DIVIDER */
    .form-divider {
      text-align: center;
      color: #aaa;
      font-size: 0.88rem;
      margin: 1.25rem 0 1rem 0;
      position: relative;
    }

    .form-divider::before,
    .form-divider::after {
      content: "";
      display: inline-block;
      width: 22%;
      height: 1px;
      background-color: #ddd;
      vertical-align: middle;
      margin: 0 0.75rem;
    }

    /* FORM */
    form label {
      display: block;
      margin-top: 1.25rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #444;
    }

    form input, form textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      margin-top: 0.35rem;
      border-radius: 0.6rem;
      border: 1px solid #ddd;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      background: #fff;
      transition: border-color 0.2s;
    }

    form input:focus, form textarea:focus {
      outline: none;
      border-color: #bb2f2f;
    }

    form textarea {
      min-height: 100px;
      resize: vertical;
    }

    form button {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: #d4a24e;
      color: #fff;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 0.6rem;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: background 0.3s;
    }

    form button:hover { background: #b88c32; }

    .confirmation {
      display: none;
      margin-top: 1rem;
      font-weight: bold;
      color: green;
      text-align: center;
    }

    .back-home {
      display: inline-block;
      margin-top: 1.25rem;
      text-decoration: none;
      padding: 0.6rem 1.25rem;
      border-radius: 0.6rem;
      background-color: #eee;
      color: #555;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .back-home:hover { background-color: #d8cfc0; }

    /* MOBILE */
    @media (max-width: 600px) {
      .contact-main {
        margin: 1rem;
        padding: 1.5rem 1rem;
      }
      .contact-main h1 {
        font-size: 1.6rem;
      }
      .contact-info-item {
        min-width: 130px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="images/logo.png" alt="Baratisay Logo" />
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main class="contact-main">
    <h1>Contact Us</h1>
    <p>📞 We’re excited to be a part of your wedding journey!</p>

    <div class="contact-info">
      <div class="contact-info-item">
        <span class="contact-icon">📱</span>
        <strong>Call / WhatsApp</strong>
        <p><a href="tel:+918745960120">+91 87459 60120</a></p>
      </div>
      <div class="contact-info-item">
        <span class="contact-icon">📍</span>
        <strong>Service Area</strong>
        <p>Delhi NCR</p>
      </div>
    </div>

    <a href="https://wa.me/918745960120" target="_blank" class="whatsapp-btn">💬 Chat with us on WhatsApp</a>

    <div class="form-divider">Or send us your details below</div>

    <form id="whatsappForm" onsubmit="sendWhatsApp(); return false;">
      <label>Your Name</label>
      <input type="text" id="name" placeholder="Your Name" required />

      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" required />

      <label>Your Message</label>
      <textarea id="message" placeholder="Tell us your wedding needs..." required></textarea>

      <button type="submit">Send via WhatsApp</button>
    </form>

    <div id="confirmation" class="confirmation">
      ✅ WhatsApp is opening — please complete your message there.
    </div>

    <a href="index.html" class="back-home">⬅ Back to Home</a>
  </main>

  <script>
    function sendWhatsApp() {
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      const fullMessage = `Hello, I'm interested in Baratisay Services!%0A%0AName: ${name}%0AEmail: ${email}%0AMessage: ${message}`;
      const whatsappNumber = "918745960120"; // Your WhatsApp number with country code
      const url = `https://wa.me/${whatsappNumber}?text=${fullMessage}`;

      document.getElementById("confirmation").style.display = "block";

      setTimeout(() => {
        window.open(url, '_blank');
      }, 800);
    }
  </script>
</body>
</html>
